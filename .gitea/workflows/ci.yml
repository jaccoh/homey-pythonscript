name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run tests
        run: ~/.local/bin/uv run --extra dev pytest -v

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Lint
        run: ~/.local/bin/uv tool run ruff check .

  review:
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Claude code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git fetch origin
          export GIT_DIFF="$(git diff origin/main..HEAD)"
          ~/.local/bin/uv run --with anthropic python scripts/ci_review.py

  deploy:
    runs-on: self-hosted
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache npm python3
          curl -LsSf https://astral.sh/uv/install.sh | sh
          npm install -g homey@4.4.0 --quiet

      - name: Restore Homey CLI settings
        env:
          HOMEY_ATHOM_CLI_SETTINGS: ${{ secrets.HOMEY_ATHOM_CLI_SETTINGS }}
        run: |
          mkdir -p ~/.athom-cli
          printf '%s' "$HOMEY_ATHOM_CLI_SETTINGS" > ~/.athom-cli/settings.json

      - name: Refresh Athom OAuth token
        run: python3 scripts/refresh_homey_token.py

      - name: Validate app
        run: homey app validate

      - name: Deploy to Homey SHS
        run: homey app install

  integration-test:
    runs-on: self-hosted
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Restore Homey CLI settings
        env:
          HOMEY_ATHOM_CLI_SETTINGS: ${{ secrets.HOMEY_ATHOM_CLI_SETTINGS }}
        run: |
          mkdir -p ~/.athom-cli
          printf '%s' "$HOMEY_ATHOM_CLI_SETTINGS" > ~/.athom-cli/settings.json

      - name: Wait for app startup
        run: sleep 8

      - name: Run integration tests
        env:
          HOMEY_TEST_DEVICE_ID: 9be2fd62-8d21-4eb4-afc0-58cbb73a8215
          HOMEY_TEST_LOGIC_VAR: zon_impact
        run: ~/.local/bin/uv run --extra dev pytest -m integration -v
