name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run tests
        run: ~/.local/bin/uv run --extra dev pytest -v

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Lint
        run: ~/.local/bin/uv tool run ruff check .

  review:
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Claude code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git fetch origin
          export GIT_DIFF="$(git diff origin/main..HEAD)"
          ~/.local/bin/uv run --with anthropic python scripts/ci_review.py

  deploy:
    runs-on: self-hosted
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Homey CLI
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          npm install -g homey --quiet

      - name: Restore Homey CLI settings
        env:
          HOMEY_ATHOM_CLI_SETTINGS: ${{ secrets.HOMEY_ATHOM_CLI_SETTINGS }}
        run: |
          mkdir -p ~/.athom-cli
          printf '%s' "$HOMEY_ATHOM_CLI_SETTINGS" > ~/.athom-cli/settings.json

      - name: Validate app
        run: homey app validate

      - name: Deploy to Homey SHS
        run: homey app install
