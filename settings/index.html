<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python Script</title>
  <script src="/homey.js" data-origin="settings"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; color: #333; }
    h2 { font-size: 16px; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #eee; font-size: 13px; }
    th { font-weight: 600; color: #666; }
    button.del { background: none; border: none; color: #c00; cursor: pointer; font-size: 13px; padding: 0; }
    button.del:hover { text-decoration: underline; }
    #status { font-size: 12px; color: #888; margin-top: 4px; }
    #error { font-size: 12px; color: #c00; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Virtual Environments</h2>
  <div id="status">Loading...</div>
  <div id="error"></div>
  <table>
    <thead><tr><th>Environment</th><th>Requirements hash</th><th></th></tr></thead>
    <tbody id="venv-list"></tbody>
  </table>

  <script>
    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function setError(msg) { document.getElementById('error').textContent = msg; }

    function buildRow(v) {
      var tr = document.createElement('tr');

      var tdUid = document.createElement('td');
      tdUid.textContent = v.name;

      var tdHash = document.createElement('td');
      tdHash.textContent = v.hash ? v.hash.slice(0, 12) + '...' : '-';

      var tdAction = document.createElement('td');
      var btn = document.createElement('button');
      btn.className = 'del';
      btn.textContent = 'Delete';
      btn.addEventListener('click', function() { delVenv(v.name, btn); });
      tdAction.appendChild(btn);

      tr.appendChild(tdUid);
      tr.appendChild(tdHash);
      tr.appendChild(tdAction);
      return tr;
    }

    async function load() {
      setError('');
      try {
        var venvs = await Homey.api('GET', '/venvs');
        var tbody = document.getElementById('venv-list');
        while (tbody.firstChild) { tbody.removeChild(tbody.firstChild); }
        if (!venvs || !Array.isArray(venvs) || !venvs.length) {
          setStatus('No virtual environments.');
          return;
        }
        setStatus(venvs.length + ' environment(s)');
        for (var i = 0; i < venvs.length; i++) {
          tbody.appendChild(buildRow(venvs[i]));
        }
      } catch (e) {
        setStatus('');
        setError('Failed to load: ' + e.message);
      }
    }

    async function delVenv(uid, btn) {
      if (btn.dataset.confirm !== '1') {
        btn.dataset.confirm = '1';
        btn.textContent = 'Confirm?';
        setTimeout(function() { btn.dataset.confirm = '0'; btn.textContent = 'Delete'; }, 3000);
        return;
      }
      btn.disabled = true;
      try {
        await Homey.api('POST', '/venv-delete', {uid: uid});
        load();
      } catch (e) {
        setError('Delete failed: ' + e.message);
        btn.disabled = false;
      }
    }

    function onHomeyReady(Homey) {
      Homey.ready();
      load();
    }
  </script>
</body>
</html>
