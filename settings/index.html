<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python Script</title>
  <script src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .tabs { display: flex; border-bottom: 1px solid #ddd; background: #f8f8f8; flex-shrink: 0; }
    .tab { padding: 9px 16px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; user-select: none; }
    .tab.active { border-bottom-color: #3572A5; color: #3572A5; font-weight: 600; }

    .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; position: relative; }
    .panel.active { display: flex; }

    .script-toolbar { display: flex; gap: 5px; align-items: center; padding: 6px 8px; border-bottom: 1px solid #ddd; background: #fafafa; flex-shrink: 0; }
    .script-toolbar select { flex: 1; min-width: 0; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; }
    .script-toolbar input { font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; }
    .script-toolbar button { font-size: 12px; padding: 4px 8px; cursor: pointer; white-space: nowrap; }
    #args-input { flex: 1; }
    #editor-status { font-size: 11px; color: #888; white-space: nowrap; }

    /* sandbox + venv row */
    #sandbox-label { font-size: 12px; white-space: nowrap; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #sandbox-label input[type=checkbox] { margin: 0; cursor: pointer; }
    #venv-select { font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; min-width: 80px; flex: 1; }

    /* New-script popup */
    #new-popup {
      display: none; position: fixed; z-index: 200;
      background: #fff; border: 1px solid #aaa; border-radius: 5px;
      padding: 10px; box-shadow: 0 3px 12px rgba(0,0,0,.2);
      flex-direction: column; gap: 6px;
    }
    #new-popup label { font-size: 12px; color: #555; }
    #new-name-input { font-size: 13px; padding: 5px 7px; border: 1px solid #ccc; border-radius: 3px; width: 180px; }
    #new-create-btn { font-size: 12px; padding: 5px 10px; cursor: pointer; align-self: flex-end; }
    #new-name-error { font-size: 11px; color: #c00; display: none; }

    #monaco-container { flex: 1; overflow: hidden; min-height: 0; }
    .output-panel { height: 110px; border-top: 1px solid #ddd; background: #1e1e1e; color: #d4d4d4; font-family: monospace; font-size: 12px; overflow-y: auto; padding: 5px 8px; flex-shrink: 0; }
    .output-line { margin: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .output-error { color: #f88; }
    .output-ok { color: #8f8; }

    /* Venvs tab */
    .venvs-panel { padding: 10px 12px; overflow-y: auto; flex: 1; }
    .venv-form { background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 12px; }
    .venv-form h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #444; }
    .venv-form-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .venv-form label { font-size: 12px; color: #666; width: 80px; flex-shrink: 0; }
    .venv-form input { flex: 1; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; }
    .venv-form textarea { flex: 1; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-family: monospace; resize: vertical; height: 60px; }
    .venv-form button { font-size: 12px; padding: 5px 12px; cursor: pointer; }
    #venv-build-status { font-size: 11px; color: #888; margin-top: 4px; }
    h2 { font-size: 14px; margin-bottom: 6px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #eee; font-size: 12px; }
    th { font-weight: 600; color: #666; }
    button.del { background: none; border: none; color: #c00; cursor: pointer; font-size: 12px; }
    #venv-list-status { font-size: 12px; color: #888; margin-bottom: 4px; }
    #venv-list-error { font-size: 12px; color: #c00; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="scripts">Scripts</div>
    <div class="tab" data-tab="venvs">Environments</div>
  </div>

  <!-- Scripts tab -->
  <div class="panel active" id="tab-scripts">
    <!-- Row 1: script picker -->
    <div class="script-toolbar">
      <select id="script-select"><option value="">-- select script --</option></select>
      <button id="new-btn">+ New</button>
      <button id="del-script-btn" style="color:#c00;display:none">Delete</button>
    </div>
    <!-- Row 2: execution mode -->
    <div class="script-toolbar" style="border-top:none">
      <label id="sandbox-label">
        <input type="checkbox" id="sandbox-cb" checked>
        Sandbox
      </label>
      <select id="venv-select" style="display:none">
        <option value="">-- no venv --</option>
      </select>
    </div>
    <!-- Row 3: run controls -->
    <div class="script-toolbar" style="border-top:none">
      <input id="args-input" placeholder="args (optional)" autocomplete="off" spellcheck="false">
      <button id="save-btn">Save</button>
      <button id="run-btn">&#9654; Run</button>
      <span id="editor-status"></span>
    </div>
    <div id="monaco-container"></div>
    <div class="output-panel" id="output-panel">
      <div style="color:#555;font-size:11px">Output appears here after Run</div>
    </div>
  </div>

  <!-- New-script popup -->
  <div id="new-popup">
    <label>Script name</label>
    <input id="new-name-input" placeholder="my-script" autocomplete="off" spellcheck="false">
    <div id="new-name-error">Letters, digits, - and _ only</div>
    <button id="new-create-btn">Create</button>
  </div>

  <!-- Venvs tab -->
  <div class="panel" id="tab-venvs">
    <div class="venvs-panel">
      <div class="venv-form">
        <h3>New / rebuild environment</h3>
        <div class="venv-form-row">
          <label>Name</label>
          <input id="venv-name-input" placeholder="my-env" autocomplete="off" spellcheck="false">
        </div>
        <div class="venv-form-row">
          <label>Requirements</label>
          <textarea id="venv-req-input" placeholder="requests==2.31.0&#10;numpy>=1.26"></textarea>
        </div>
        <div class="venv-form-row" style="justify-content:flex-end">
          <button id="venv-build-btn">Build</button>
        </div>
        <div id="venv-build-status"></div>
      </div>
      <h2>Existing environments</h2>
      <div id="venv-list-status">Loading...</div>
      <div id="venv-list-error"></div>
      <table>
        <thead><tr><th>Name</th><th>Req. hash</th><th></th></tr></thead>
        <tbody id="venv-list"></tbody>
      </table>
    </div>
  </div>

  <script>
    var editor = null;
    var currentScript = null;
    var _H = null;
    var _NAME_RE = /^[\w\-]+$/;

    // Tab switching
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var name = tab.dataset.tab;
        closeNewPopup();
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === name); });
        document.querySelectorAll('.panel').forEach(function(p) { p.classList.toggle('active', p.id === 'tab-' + name); });
        if (name === 'venvs') loadVenvList();
        if (editor) editor.layout();
      });
    });

    function setStatus(msg) { document.getElementById('editor-status').textContent = msg; }
    function appendOutput(text, cls) {
      var panel = document.getElementById('output-panel');
      var line = document.createElement('div');
      line.className = 'output-line' + (cls ? ' ' + cls : '');
      line.textContent = text;
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
    }
    function clearOutput() { document.getElementById('output-panel').innerHTML = ''; }

    // Sandbox / venv visibility
    var sandboxCb = document.getElementById('sandbox-cb');
    var venvSel = document.getElementById('venv-select');

    function updateVenvRow() {
      venvSel.style.display = sandboxCb.checked ? 'none' : '';
    }

    sandboxCb.addEventListener('change', updateVenvRow);

    function loadVenvOptions(selectName) {
      _H.api('GET', '/venvs').then(function(venvs) {
        var prev = selectName !== undefined ? selectName : venvSel.value;
        venvSel.innerHTML = '<option value="">-- no venv --</option>';
        (venvs || []).forEach(function(v) {
          var opt = document.createElement('option');
          opt.value = v.name;
          opt.textContent = v.name;
          if (v.name === prev) opt.selected = true;
          venvSel.appendChild(opt);
        });
      });
    }

    // Script dropdown
    function loadScriptList(selectName) {
      _H.api('GET', '/scripts').then(function(scripts) {
        var sel = document.getElementById('script-select');
        var prev = (selectName !== undefined) ? selectName : sel.value;
        sel.innerHTML = '<option value="">-- select script --</option>';
        (scripts || []).forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s.name;
          opt.textContent = s.name;
          if (s.name === prev) opt.selected = true;
          sel.appendChild(opt);
        });
        updateDelBtn();
      }).catch(function(e) { setStatus('List failed: ' + (e.message || e)); });
    }

    function updateDelBtn() {
      document.getElementById('del-script-btn').style.display =
        document.getElementById('script-select').value ? '' : 'none';
    }

    document.getElementById('script-select').addEventListener('change', function() {
      var name = this.value;
      updateDelBtn();
      if (!name) { currentScript = null; return; }
      _H.api('POST', '/script-get', {name: name}).then(function(result) {
        currentScript = name;
        if (editor) editor.setValue(result.code || '');
        sandboxCb.checked = result.sandbox !== false;
        venvSel.value = result.venv || '';
        updateVenvRow();
        clearOutput();
        setStatus('');
      }).catch(function(e) { setStatus('Open failed: ' + (e.message || e)); });
    });

    // New popup
    var _newPopupOpen = false;

    function openNewPopup() {
      var btn = document.getElementById('new-btn');
      var popup = document.getElementById('new-popup');
      var r = btn.getBoundingClientRect();
      popup.style.top = (r.bottom + 4) + 'px';
      popup.style.left = r.left + 'px';
      popup.style.display = 'flex';
      _newPopupOpen = true;
      document.getElementById('new-name-input').value = '';
      document.getElementById('new-name-error').style.display = 'none';
      setTimeout(function() { document.getElementById('new-name-input').focus(); }, 0);
    }

    function closeNewPopup() {
      document.getElementById('new-popup').style.display = 'none';
      _newPopupOpen = false;
    }

    function commitNewScript() {
      var name = document.getElementById('new-name-input').value.trim();
      var errEl = document.getElementById('new-name-error');
      if (!name || !_NAME_RE.test(name)) {
        errEl.style.display = '';
        document.getElementById('new-name-input').focus();
        return;
      }
      errEl.style.display = 'none';
      closeNewPopup();
      currentScript = name;
      document.getElementById('script-select').value = '';
      updateDelBtn();
      sandboxCb.checked = true;
      venvSel.value = '';
      updateVenvRow();
      if (editor) editor.setValue('# ' + name + '\nreturn 42');
      clearOutput();
      setStatus('New: ' + name + ' (unsaved)');
    }

    document.getElementById('new-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      if (_newPopupOpen) { closeNewPopup(); } else { openNewPopup(); }
    });
    document.getElementById('new-create-btn').addEventListener('click', commitNewScript);
    document.getElementById('new-name-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') commitNewScript();
      if (e.key === 'Escape') closeNewPopup();
    });
    document.addEventListener('click', function(e) {
      if (_newPopupOpen && !document.getElementById('new-popup').contains(e.target)) {
        closeNewPopup();
      }
    });

    // Delete script
    var _delScriptConfirm = null;
    document.getElementById('del-script-btn').addEventListener('click', function() {
      var btn = this;
      var name = document.getElementById('script-select').value;
      if (!name) return;
      if (_delScriptConfirm) {
        clearTimeout(_delScriptConfirm);
        _delScriptConfirm = null;
        btn.textContent = 'Delete';
        _H.api('POST', '/script-delete', {name: name}).then(function() {
          currentScript = null;
          document.getElementById('script-select').value = '';
          if (editor) editor.setValue('');
          clearOutput();
          setStatus('Deleted');
          loadScriptList('');
        }).catch(function(e) { setStatus('Delete failed: ' + (e.message || e)); });
      } else {
        btn.textContent = '?';
        _delScriptConfirm = setTimeout(function() { _delScriptConfirm = null; btn.textContent = 'Delete'; }, 3000);
      }
    });

    function currentMeta() {
      return {
        sandbox: sandboxCb.checked,
        venv: sandboxCb.checked ? null : (venvSel.value || null),
      };
    }

    // Save
    document.getElementById('save-btn').addEventListener('click', function() {
      if (!currentScript) { setStatus('Create or select a script first'); return; }
      var meta = currentMeta();
      _H.api('POST', '/script-save', {name: currentScript, code: editor ? editor.getValue() : '', sandbox: meta.sandbox, venv: meta.venv}).then(function() {
        setStatus('Saved');
        loadScriptList(currentScript);
      }).catch(function(e) { setStatus('Save failed: ' + (e.message || e)); });
    });

    // Run
    document.getElementById('run-btn').addEventListener('click', function() {
      if (!currentScript) { setStatus('Create or select a script first'); return; }
      var meta = currentMeta();
      var args = document.getElementById('args-input').value.trim() || null;
      clearOutput();
      setStatus('Saving...');
      _H.api('POST', '/script-save', {name: currentScript, code: editor ? editor.getValue() : '', sandbox: meta.sandbox, venv: meta.venv}).then(function() {
        setStatus('Running...');
        return _H.api('POST', '/script-run', {name: currentScript, args: args, sandbox: meta.sandbox, venv: meta.venv});
      }).then(function(result) {
        if (result && result.error) {
          appendOutput('Error: ' + result.error, 'output-error');
          setStatus('Failed');
        } else {
          appendOutput('return_value: ' + ((result && result.return_value != null) ? result.return_value : '(empty)'), 'output-ok');
          setStatus('Done');
        }
        loadScriptList(currentScript);
      }).catch(function(e) {
        appendOutput('Error: ' + (e.message || e), 'output-error');
        setStatus('Failed');
      });
    });

    // Venvs tab
    function setBuildStatus(msg, isErr) {
      var el = document.getElementById('venv-build-status');
      el.textContent = msg;
      el.style.color = isErr ? '#c00' : '#888';
    }

    document.getElementById('venv-build-btn').addEventListener('click', function() {
      var name = document.getElementById('venv-name-input').value.trim();
      var req = document.getElementById('venv-req-input').value.trim();
      if (!name) { setBuildStatus('Enter a name', true); return; }
      setBuildStatus('Building... (this may take a minute)');
      _H.api('POST', '/venv-build', {name: name, requirements: req}).then(function() {
        setBuildStatus('Built: ' + name);
        loadVenvList();
        loadVenvOptions('');
      }).catch(function(e) { setBuildStatus('Build failed: ' + (e.message || e), true); });
    });

    function buildVenvRow(v) {
      var tr = document.createElement('tr');
      var tdName = document.createElement('td'); tdName.textContent = v.name;
      var tdHash = document.createElement('td'); tdHash.textContent = v.hash ? v.hash.slice(0, 10) + '...' : '-';
      var tdBtn = document.createElement('td');
      var btn = document.createElement('button'); btn.className = 'del'; btn.textContent = 'Delete';
      var _confirm = null;
      btn.addEventListener('click', function() {
        if (_confirm) {
          clearTimeout(_confirm); _confirm = null; btn.textContent = 'Delete';
          btn.disabled = true;
          _H.api('POST', '/venv-delete', {uid: v.name}).then(function() {
            loadVenvList();
            loadVenvOptions('');
          }).catch(function(e) {
            document.getElementById('venv-list-error').textContent = 'Delete failed: ' + (e.message || e);
            btn.disabled = false;
          });
        } else {
          btn.textContent = '?';
          _confirm = setTimeout(function() { _confirm = null; btn.textContent = 'Delete'; }, 3000);
        }
      });
      tdBtn.appendChild(btn); tr.appendChild(tdName); tr.appendChild(tdHash); tr.appendChild(tdBtn);
      return tr;
    }

    function loadVenvList() {
      document.getElementById('venv-list-error').textContent = '';
      _H.api('GET', '/venvs').then(function(venvs) {
        var tbody = document.getElementById('venv-list');
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
        if (!venvs || !venvs.length) { document.getElementById('venv-list-status').textContent = 'No environments.'; return; }
        document.getElementById('venv-list-status').textContent = venvs.length + ' environment(s)';
        venvs.forEach(function(v) { tbody.appendChild(buildVenvRow(v)); });
      }).catch(function(e) {
        document.getElementById('venv-list-status').textContent = '';
        document.getElementById('venv-list-error').textContent = 'Failed: ' + (e.message || e);
      });
    }

    // Monaco
    function initMonaco() {
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
      require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monaco-container'), {
          value: '# Select or create a script',
          language: 'python',
          theme: 'vs',
          minimap: { enabled: false },
          fontSize: 13,
          lineNumbers: 'on',
          scrollBeyondLastLine: false,
          automaticLayout: true,
          wordWrap: 'on',
        });
        loadScriptList('');
        loadVenvOptions('');
      });
    }

    function onHomeyReady(H) {
      _H = H;
      _H.ready();
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js';
      s.onload = initMonaco;
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
